components:
  securitySchemes:
    TelegramSecretToken:
      type: apiKey
in: header
            name: X-Telegram-Bot-Api-Secret-Token
          description: Секретний токен для верифікації Telegram webhook (64 символи hex)
      x-security:
        - Secret token check: 403 Forbidden if invalid
        - Rate limiting: 500ms per user_id
        - Input sanitization: safeHTML(), safeInt(), safeQuantity(), safeNum()
        - Regex validation: phone, order numbers
        - Logging: every message to telegram_messages_log
    SupabaseAnonKey:
      type: apiKey
      in: header
      name: apikey
      description: Supabase anon key для публічного доступу
    SupabaseServiceRole:
      type: apiKey
      in: header
      name: apikey
      description: Supabase service_role key для привілейованого доступу

  schemas:
    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        sku: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
        category_id: { type: integer, nullable: true }
        unit: { type: string }
        purchase_price: { type: number, nullable: true, format: double }
        min_stock: { type: number, nullable: true, format: double }
        max_stock: { type: number, nullable: true, format: double }
        description: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProductCard:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        sku: { type: string, nullable: true }
        unit: { type: string }
        purchase_price: { type: number, nullable: true }
        description: { type: string, nullable: true }
        total_stock: { type: number }
        min_stock: { type: number, nullable: true }
        supplier:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }

    ProductDetail:
      type: object
      properties:
        product:
          $ref: "#/components/schemas/Product"
        stock:
          type: array
          items:
            type: object
            properties:
              warehouse_id: { type: integer }
              warehouse_name: { type: string }
              quantity: { type: number }
        receipts:
          type: array
          items:
            type: object
            properties:
              receipt_id: { type: string, format: uuid }
              receipt_number: { type: string }
              receipt_date: { type: string, format: date-time }
              supplier_id: { type: integer, nullable: true }
              supplier_name: { type: string, nullable: true }
              warehouse_id: { type: integer }
              warehouse_name: { type: string }
              quantity: { type: number }
              price: { type: number, nullable: true }
              total: { type: number, nullable: true }
        price_history:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              price: { type: number }
              receipt_number: { type: string }
              supplier_name: { type: string, nullable: true }
        supplier:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            contact_person: { type: string, nullable: true }
            phone: { type: string, nullable: true }
            email: { type: string, nullable: true }
            edrpou: { type: string, nullable: true }
            category: { type: string, nullable: true }

    Supplier:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        contact_person: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        address: { type: string, nullable: true }
        edrpou: { type: string, nullable: true }
        payment_days: { type: integer, nullable: true }
        category: { type: string, nullable: true }
        website: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        is_active: { type: boolean }

    SupplierWithStats:
      allOf:
        - $ref: "#/components/schemas/Supplier"
        - type: object
          properties:
            total_receipts: { type: integer }
            total_products_supplied: { type: integer }
            total_amount: { type: number }
            receipts_30d: { type: integer }
            last_receipt_date: { type: string, format: date, nullable: true }
            first_receipt_date: { type: string, format: date, nullable: true }
            total_paid: { type: number }
            total_debt: { type: number }
            payment_count: { type: integer }
            last_payment_date: { type: string, format: date, nullable: true }
            payment_percent: { type: number }

    SupplierDetail:
      type: object
      properties:
        supplier:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            contact_person: { type: string, nullable: true }
            phone: { type: string, nullable: true }
            email: { type: string, nullable: true }
            edrpou: { type: string, nullable: true }
            category: { type: string, nullable: true }
            website: { type: string, nullable: true }
            payment_days: { type: integer, nullable: true }
            notes: { type: string, nullable: true }
            created_at: { type: string, format: date-time }
        receipts:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              receipt_number: { type: string }
              confirmed_at: { type: string, format: date-time }
              warehouse_name: { type: string }
              items_count: { type: integer }
              total_amount: { type: number }
              items:
                type: array
                items:
                  type: object
                  properties:
                    product_id: { type: integer }
                    product_name: { type: string }
                    sku: { type: string, nullable: true }
                    quantity: { type: number }
                    price: { type: number, nullable: true }
                    total: { type: number, nullable: true }
        payments:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              amount: { type: number }
              payment_date: { type: string, format: date }
              payment_method: { type: string, nullable: true }
              reference_number: { type: string, nullable: true }
              notes: { type: string, nullable: true }
        stats:
          type: object
          properties:
            total_receipts: { type: integer }
            total_items: { type: integer }
            total_amount: { type: number }
            total_paid: { type: number }
            total_debt: { type: number }
            first_receipt_date: { type: string, format: date, nullable: true }
            last_receipt_date: { type: string, format: date, nullable: true }
            payment_count: { type: integer }
            last_payment_date: { type: string, format: date, nullable: true }

    CategoryWithSuppliers:
      type: object
      properties:
        category_id: { type: integer }
        category_name: { type: string }
        supplier_count: { type: integer }
        suppliers:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              total_receipts: { type: integer }
              total_amount: { type: number }
              total_products: { type: integer }

    SupplierPayment:
      type: object
      properties:
        id: { type: string, format: uuid }
        supplier_id: { type: integer }
        amount: { type: number }
        payment_date: { type: string, format: date }
        payment_method: { type: string, nullable: true }
        reference_number: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
        total_pages: { type: integer }
